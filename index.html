const verdictClass = { bubble: 'verdict-bubble', real: 'verdict-real', ongoing: 'verdict-ongoing', mixed: 'verdict-mixed' };
const verdictText = { bubble: '버블 판정', real: '실체 확인', ongoing: '진행중', mixed: '혼재' };

let currentFilter = null;

function renderTimeline(filter) {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  
  for (const row of data) {
    const techs = filter ? row.techs.filter(t => row.phase === filter) : row.techs;
    if (techs.length === 0) continue;
    
    const yr = document.createElement('div');
    yr.className = 'year-row';
    
    const lbl = document.createElement('div');
    lbl.className = 'year-label';
    lbl.textContent = row.year;
    
    const tags = document.createElement('div');
    tags.className = 'techs';
    
    for (const t of techs) {
      const tag = document.createElement('div');
      tag.className = `tag p${row.phase} ${t.verdict === 'bubble' ? 'bubble' : ''} ${row.year >= 2025 ? 'current' : ''}`;
      tag.textContent = t.name;
      tag.onclick = () => showDetail(t, row);
      tags.appendChild(tag);
    }
    
    yr.appendChild(lbl);
    yr.appendChild(tags);
    tl.appendChild(yr);
    
    if ([2017, 2020, 2023].includes(row.year)) {
      const div = document.createElement('div');
      div.className = 'divider';
      tl.appendChild(div);
    }
  }
}

function showDetail(tech, row) {
  const panel = document.getElementById('detail');
  panel.className = 'detail-panel active';
  panel.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-title">${tech.name}</div>
        <div class="detail-meta">${row.year}년 · ${row.phase}단계</div>
      </div>
      <span class="verdict-badge ${verdictClass[tech.verdict]}">${verdictText[tech.verdict]}</span>
    </div>
    <div class="detail-grid">
      <div class="detail-item" style="grid-column:1/-1">
        <label>기술 개요</label>
        <p>${tech.desc}</p>
      </div>
      <div class="detail-item">
        <label>시장의 기대</label>
        <p>${tech.expect}</p>
      </div>
      <div class="detail-item">
        <label>산업적 파급</label>
        <p>${tech.impact}</p>
      </div>
      <div class="detail-item">
        <label>주목받은 종목</label>
        <div class="stocks">${tech.stocks.map(s=>`<span class="stock-tag">${s}</span>`).join('')}</div>
      </div>
      <div class="detail-item">
        <label>투자 규모</label>
        <p>${tech.invest}</p>
      </div>
    </div>
    <button class="ask-btn" onclick="sendPrompt('${tech.name} 기술이 버블인지 실체인지 더 자세히 분석해줘')">이 기술 심층 분석 요청 ↗</button>
  `;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function filterPhase(p) {
  if (currentFilter === p) {
    currentFilter = null;
  } else {
    currentFilter = p;
  }
  renderTimeline(currentFilter);
  document.getElementById('detail').className = 'detail-panel';
}

renderTimeline(null);
